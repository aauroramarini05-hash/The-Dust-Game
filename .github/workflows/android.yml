name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Godot
      run: |
        wget https://downloads.tuxfamily.org/godotengine/4.2/Godot_v4.2-stable_linux.x86_64.zip
        unzip Godot_v4.2-stable_linux.x86_64.zip
        chmod +x Godot_v4.2-stable_linux.x86_64

    - name: Export APK
      run: |
        ./Godot_v4.2-stable_linux.x86_64 --headless --export-release "Android" build/game.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: AndroidGame
        path: build/game.apk
