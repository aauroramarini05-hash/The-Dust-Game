name: Android CI Build

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Build with Gradle
      run: ./gradlew assembleRelease --stacktrace --info
      
    - name: Sign APK (if keystore available)
      continue-on-error: true
      run: |
        if [ -f "${{ secrets.KEYSTORE_PATH }}" ]; then
          echo "Signing APK..."
          jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 \
            -keystore ${{ secrets.KEYSTORE_PATH }} \
            -storepass ${{ secrets.KEYSTORE_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            app/build/outputs/apk/release/app-release-unsigned.apk \
            ${{ secrets.KEY_ALIAS }}
        else
          echo "No keystore found, skipping signing"
        fi
        
    - name: Rename APK
      run: |
        cd app/build/outputs/apk/release
        if [ -f "app-release-unsigned.apk" ]; then
          mv app-release-unsigned.apk AuryxSoda-v1.305.01.apk
        elif [ -f "app-release.apk" ]; then
          mv app-release.apk AuryxSoda-v1.305.01.apk
        fi
        
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: AuryxSoda-v1.305.01
        path: app/build/outputs/apk/release/AuryxSoda-v1.305.01.apk
        retention-days: 30
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/release/AuryxSoda-v1.305.01.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
